<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">

    support, installation, configuration, and programming in Sonoma County.
    House-calls.">
    <meta content="CoEntropy.net" property="og:title">

  <body>
    <header></header>
    <main>
      <form action="https://formsubmit.co/brendan@coentropy.net" method="POST" target="_self" autocomplete="on">
        <fieldset>
          <legend>Contact us:</legend>
          <label for="fname">First name:</label><br>
          <input type="text" id="fname" name="fname" placeholder="First"><br>
          <label for="lname">Last name:</label><br>
          <input type="text" id="lname" name="lname" placeholder="Last"><br>
          <label for="email">Enter your email:</label><br>
          <input type="email" id="email" name="email" placeholder="email" re><br>
          <label for="phone">Phone number (optional):</label><br>
          <input type="tel" id="phone" name="phone" placeholder="(###) ###-####"><br>
          <label for="problem">Tell us a bit about your issue:</label><br>
          <textarea name="problem" rows="15" cols="50" placeholder="Tales of woe"></textarea><br>
          <input type="submit" value="Submit">
        </fieldset>
      </form>
    </main>
    <footer></footer>
  </body>
